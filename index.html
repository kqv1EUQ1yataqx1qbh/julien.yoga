
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Berlin Yoga Teacher Julien Balmer</title>
<meta name="description" content="Traditional Hatha- and Kundalini-Yoga with seasoned yogi Julien Balmer" />
<meta property="og:site_name" content="Berlin Yoga Teacher Julien Balmer" />
<meta property="og:title" content="Berlin Yoga Teacher Julien Balmer" />
<meta property="og:type" content="website" />
<meta property="og:description" content="Traditional Hatha- and Kundalini-Yoga with seasoned yogi Julien Balmer" />
<link rel="icon" href="favicon.ico">
<style>
  @font-face {
    font-family: "Lato";
    font-style: normal;
    font-weight: 300;
    font-display: swap;
    src: url("fonts/lato-light.woff2") format("woff2");
  }

  @font-face {
    font-family: "Lato";
    font-style: normal;
    font-weight: 700;
    font-display: swap;
    src: url("fonts/lato-bold.woff2") format("woff2");
  }

  :root {
    --bg-fallback: #241a2c;
    --ink: #f5f2ee;
    --ink-dim: rgba(245, 242, 238, 0.94);
    --accent: #7a1c46;
    --accent-hover: #8f2251;
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    font-family: "Lato", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--ink);
    background-color: var(--bg-fallback);
    background-image: url("bg.jpg");
    background-size: cover;
    background-position: left center;
    background-repeat: no-repeat;
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: flex-start;
    padding: 6vh 6vw;
    text-align: left;
  }

  main {
    max-width: 30rem;
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.7), 0 1px 2px rgba(0, 0, 0, 0.85);
  }

  h1 {
    font-weight: 700;
    text-transform: uppercase;
    font-size: clamp(1.1rem, 2.1vw, 1.5rem);
    letter-spacing: 0.08em;
    line-height: 1.4;
    margin: 0 0 1.5rem;
    white-space: nowrap;
  }

  @media (max-width: 480px) {
    h1 { white-space: normal; }
  }

  p {
    font-weight: 300;
    font-size: 1.05rem;
    line-height: 1.7;
    color: var(--ink-dim);
    margin: 0 0 2rem;
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.7), 0 1px 2px rgba(0, 0, 0, 0.85);
  }

  a.email {
    display: inline-block;
    padding: 0.9em 2em;
    background-color: var(--accent);
    border: none;
    color: var(--ink);
    text-decoration: none;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 700;
    font-size: 0.78rem;
    text-shadow: none;
    transition: background-color 0.2s ease;
  }

  a.email:hover,
  a.email:focus-visible {
    background-color: var(--accent-hover);
  }

  a.email:focus-visible {
    outline: 2px solid var(--ink);
    outline-offset: 3px;
  }

  @media (max-width: 640px) {
    body { padding: 6vh 7vw; }
    main { max-width: 100%; }
  }

  @media (prefers-reduced-motion: reduce) {
    a.email { transition: none; }
  }
</style>
</head>
<body>
  <main>
    <h1>Welcome, Fellow Traveler</h1>
    <p>More retreats will be scheduled and announced soon. In the meantime, feel invited to drop me an email.</p>
    <a class="email" href="mailto:julien.yoga@pm.me">Email Julien</a>
  </main>
</body>
</html>
