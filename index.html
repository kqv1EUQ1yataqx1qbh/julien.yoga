<style>
  :root {
    --bg-fallback: #382e41;
    --ink: #f4f1ec;
    --ink-dim: rgba(244, 241, 236, 0.82);
  }

  * { box-sizing: border-box; }

  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", Palatino, serif;
    color: var(--ink);
    background-color: var(--bg-fallback);
    background-image:
      linear-gradient(180deg, rgba(30, 22, 38, 0.55) 0%, rgba(30, 22, 38, 0.75) 100%),
      url("bg.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    min-height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6vh 6vw;
    text-align: center;
  }

  main {
    max-width: 34rem;
  }

  h1 {
    font-weight: 400;
    font-size: clamp(1.9rem, 5vw, 2.75rem);
    letter-spacing: 0.02em;
    margin: 0 0 1.5rem;
  }

  p {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 1.05rem;
    line-height: 1.7;
    color: var(--ink-dim);
    margin: 0 0 2.25rem;
  }

  a.email {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: inline-block;
    padding: 0.85em 2em;
    border: 1px solid var(--ink);
    border-radius: 2px;
    color: var(--ink);
    text-decoration: none;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 0.8rem;
    transition: background-color 0.2s ease, color 0.2s ease;
  }

  a.email:hover,
  a.email:focus-visible {
    background-color: var(--ink);
    color: #241b2c;
  }

  a.email:focus-visible {
    outline: 2px solid var(--ink);
    outline-offset: 4px;
  }

  @media (prefers-reduced-motion: reduce) {
    a.email { transition: none; }
  }
</style>
</head>
<body>
  <main>
    <h1>Welcome, Fellow Traveler</h1>
    <p>More retreats will be scheduled and announced soon. In the meantime, feel invited to drop me an email.</p>
    <a class="email" href="mailto:julien.yoga@pm.me">Email Julien</a>
  </main>
</body>
